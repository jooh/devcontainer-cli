name: rust-port-convergence

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-port:
    name: Rust Port Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust fmt
        run: cargo fmt --manifest-path cmd/devcontainer/Cargo.toml --all -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path cmd/devcontainer/Cargo.toml -- -D warnings

      - name: Rust check
        run: cargo check --manifest-path cmd/devcontainer/Cargo.toml

      - name: Rust tests
        run: cargo test --manifest-path cmd/devcontainer/Cargo.toml

      - name: Build release binary
        run: cargo build --release --manifest-path cmd/devcontainer/Cargo.toml

      - name: Standalone artifact smoke
        run: ./scripts/standalone/smoke.sh ./cmd/devcontainer/target/release/devcontainer

      - name: Rust coverage
        run: cargo llvm-cov --manifest-path cmd/devcontainer/Cargo.toml --lcov --output-path cmd/devcontainer/target/coverage.lcov

      - name: Native-only startup contract
        run: node build/check-native-only.js

      - name: Command matrix drift check
        run: node build/generate-command-matrix.js --check

      - name: Schema drift check
        run: node build/check-spec-drift.js

      - name: Parity harness
        run: node build/check-parity-harness.js

      - name: No Node runtime bridge
        run: node build/check-no-node-runtime.js

  network-smoke:
    name: Outbound Network Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: GHCR network smoke tests
        run: cargo test --manifest-path cmd/devcontainer/Cargo.toml --test network_smoke -- --ignored

  real-engine-lifecycle-smoke:
    name: Real Engine Lifecycle Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --manifest-path cmd/devcontainer/Cargo.toml

      - name: Docker version
        run: docker version

      - name: Real engine lifecycle smoke
        run: ./scripts/standalone/real-engine-smoke.sh ./cmd/devcontainer/target/release/devcontainer

  upstream-convergence:
    name: Upstream Convergence Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Verify pinned upstream compatibility baseline
        run: node build/check-upstream-compatibility.js
