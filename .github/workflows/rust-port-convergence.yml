name: rust-port-convergence

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-port:
    name: Rust Port Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust fmt
        run: cargo fmt --manifest-path cmd/devcontainer/Cargo.toml --all -- --check

      - name: Rust tests
        run: cargo test --manifest-path cmd/devcontainer/Cargo.toml

  upstream-convergence:
    name: Upstream Convergence Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Verify pinned upstream compatibility baseline
        run: npm run check-upstream-compatibility
