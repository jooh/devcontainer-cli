name: standalone-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  standalone:
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-22.04
          - target: darwin-x64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    env:
      SOURCE_DATE_EPOCH: '1704067200'
      NODE_VERSION: '20.19.1'
      TARGET: ${{ matrix.target }}
      ARTIFACT: dist/standalone/devcontainer-${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run compile-prod

      - name: Build standalone artifact
        run: scripts/standalone/build.sh "$TARGET"

      - name: Standalone smoke tests
        run: scripts/standalone/smoke.sh "$ARTIFACT"

      - name: Create checksums
        run: shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign checksums with cosign (keyless)
        run: cosign sign-blob --yes "$ARTIFACT.sha256" --output-signature "$ARTIFACT.sha256.sig" --output-certificate "$ARTIFACT.sha256.pem"

      - name: Upload standalone artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devcontainer-${{ matrix.target }}-standalone
          path: |
            ${{ env.ARTIFACT }}
            dist/standalone/spec-node/**
            ${{ env.ARTIFACT }}.sha256
            ${{ env.ARTIFACT }}.sha256.sig
            ${{ env.ARTIFACT }}.sha256.pem
